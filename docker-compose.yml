# Local dev dependencies for the Lovalte API (Postgres + Redis).
# Usage: docker compose up -d  →  then `npm run migrate`.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lovalte
      POSTGRES_PASSWORD: lovalte
      POSTGRES_DB: lovalte
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lovalte"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
