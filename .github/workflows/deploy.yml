name: Deploy

# Push to main → SSH to the droplet → pull + build + migrate + restart.
# Builds happen on the droplet (1 GB + swap handles it), so no registry/PAT needed.
#
# Repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST    164.92.243.43
#   DEPLOY_USER    deploy
#   DEPLOY_SSH_KEY private key of the droplet CI key (deploy/README step)
#   APP_DIR        /home/deploy/Lovalte
#   RESEND_API_KEY API key for transactional email delivery
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (pull + build + migrate + restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd ${{ secrets.APP_DIR }}
            git pull --ff-only
            touch .env.production
            chmod 600 .env.production
            if [ -n "${{ secrets.RESEND_API_KEY }}" ]; then
              if grep -q '^RESEND_API_KEY=' .env.production; then
                sed -i 's|^RESEND_API_KEY=.*|RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}|' .env.production
              else
                printf '\nRESEND_API_KEY=${{ secrets.RESEND_API_KEY }}\n' >> .env.production
              fi
            fi
            if grep -q '^EMAIL_FROM=' .env.production; then
              sed -i 's|^EMAIL_FROM=.*|EMAIL_FROM="Lovalte <hello@lovalte.com>"|' .env.production
            else
              printf 'EMAIL_FROM="Lovalte <hello@lovalte.com>"\n' >> .env.production
            fi
            if ! grep -q '^SUPPORT_EMAIL=' .env.production; then
              printf 'SUPPORT_EMAIL=support@lovalte.com\n' >> .env.production
            fi
            bash deploy/deploy.sh
