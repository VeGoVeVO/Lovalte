name: Build & Deploy

# On push to main: build both images in CI (free, plenty of RAM), push to GHCR,
# then SSH to the droplet and pull+migrate+restart. The 512 MB droplet never builds.
#
# Repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST    droplet IP or domain
#   DEPLOY_USER    deploy
#   DEPLOY_SSH_KEY private key whose public half is in the droplet authorized_keys
#   APP_DIR        repo path on the droplet, e.g. /home/deploy/Lovalte
# GHCR auth uses the built-in GITHUB_TOKEN — no extra secret needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner
        id: o
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.o.outputs.owner }}/lovalte-api:latest,ghcr.io/${{ steps.o.outputs.owner }}/lovalte-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.o.outputs.owner }}/lovalte-web:latest,ghcr.io/${{ steps.o.outputs.owner }}/lovalte-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (pull + migrate + restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.APP_DIR }}
            git pull --ff-only
            bash deploy/deploy.sh
