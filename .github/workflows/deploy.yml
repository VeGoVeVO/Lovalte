name: Deploy

# Push to main → SSH to the droplet → pull + build + migrate + restart.
# Builds happen on the droplet (1 GB + swap handles it), so no registry/PAT needed.
#
# Repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST    164.92.243.43
#   DEPLOY_USER    deploy
#   DEPLOY_SSH_KEY private key of the droplet CI key (deploy/README step)
#   APP_DIR        /home/deploy/Lovalte
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (pull + build + migrate + restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd ${{ secrets.APP_DIR }}
            git pull --ff-only
            bash deploy/deploy.sh
